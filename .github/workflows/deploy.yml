name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git worktree add --force -B gh-pages gh-pages-worktree origin/gh-pages || git worktree add --orphan -b gh-pages gh-pages-worktree
          rm -rf gh-pages-worktree/*
          cp -R dist/. gh-pages-worktree/
          touch gh-pages-worktree/.nojekyll
          cd gh-pages-worktree
          git add .
          git commit -m "Deploy GitHub Pages" || exit 0
          git push origin gh-pages
